num_channels: 256
cpu_offload: False

keep_batch_sharded: True

model:
  _target_: anemoi.models.models.NowcastPrecipUnionMeshModel
  # Per-source settings for QC decoding and node encoders
  # Assumes each dataset includes qc_flags/has_nan as the *last* forcing channel.
  # If not, set qc.qc_var_index to the correct index.
  sources:
    opera:
      qc:
        num_bits: 3
        embed_dim: 8
        qc_var_index: -1
        # invalid if nodata (bit0) or invalid (bit3) -> 1 + 8 = 9
        invalid_mask: 9
        include_bits: false
        add_valid: true
      node_encoder:
        kind: vit
        xdim: 1900
        ydim: 2200
        # channels excluding qc_flags + qc extras (valid + embedding [+ bits])
        in_channels: 10
        embed_dim: 128
        patch_size: 10
        depth: 4
        num_heads: 8

    nordic_radar:
      qc:
        num_bits: 11
        embed_dim: 16
        qc_var_index: -1
        # conservative invalid mask: nodata, blocked, sea/ground/other clutter, block>50, invalid_high
        invalid_mask: 1395
        include_bits: false
        add_valid: true
      node_encoder:
        kind: vit
        xdim: 689
        ydim: 748
        in_channels: 18
        embed_dim: 128
        patch_size: 16
        depth: 4
        num_heads: 8

    netatmo:
      qc:
        num_bits: 4
        embed_dim: 8
        qc_var_index: -1
        invalid_mask: 0
        include_bits: false
        add_valid: true
      node_encoder:
        kind: mlp
        # in_dim is computed as time * channels (after removing qc var and adding qc extras)
        in_dim: 0  # overridden in code? set explicitly if you bypass time flattening
        embed_dim: 64
        hidden_dim: 128
        depth: 3

layer_kernels:
  LayerNorm:
    _target_: torch.nn.LayerNorm
  Linear:
    _target_: torch.nn.Linear
  Activation:
    _target_: torch.nn.GELU

processor:
  _target_: anemoi.models.layers.processor.GraphTransformerProcessor
  trainable_size: ${model.trainable_parameters.hidden2hidden}
  sub_graph_edge_attributes: ${model.attributes.edges}
  num_layers: 8
  num_chunks: 2
  mlp_hidden_ratio: 4
  num_heads: 8
  qk_norm: False
  cpu_offload: ${model.cpu_offload}
  layer_kernels: ${model.layer_kernels}
  graph_attention_backend: "triton"
  edge_pre_mlp: False

encoder:
  _target_: anemoi.models.layers.mapper.GraphTransformerForwardMapper
  trainable_size: ${model.trainable_parameters.data2hidden}
  sub_graph_edge_attributes: ${model.attributes.edges}
  num_chunks: 2
  mlp_hidden_ratio: 4
  num_heads: 8
  qk_norm: False
  cpu_offload: ${model.cpu_offload}
  layer_kernels: ${model.layer_kernels}
  shard_strategy: "edges"
  graph_attention_backend: "triton"
  edge_pre_mlp: False

# decoder maps hidden -> mesh (single, shared)
decoder:
  _target_: anemoi.models.layers.mapper.GraphTransformerBackwardMapper
  trainable_size: ${model.trainable_parameters.hidden2data}
  sub_graph_edge_attributes: ${model.attributes.edges}
  num_chunks: 2
  mlp_hidden_ratio: 4
  num_heads: 8
  initialise_data_extractor_zero: False
  qk_norm: False
  cpu_offload: ${model.cpu_offload}
  layer_kernels: ${model.layer_kernels}
  shard_strategy: "edges"
  graph_attention_backend: "triton"
  edge_pre_mlp: False

trainable_parameters:
  data: 8
  hidden: 8
  data2hidden: 8
  hidden2data: 8
  hidden2hidden: 8

attributes:
  edges:
    - edge_length
    - edge_dirs
  nodes: []
