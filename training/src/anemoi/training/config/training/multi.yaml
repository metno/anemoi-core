run_id: null
fork_run_id: null
transfer_learning: False
load_weights_only: False

deterministic: False
precision: 16-mixed

multistep_input: 12

accum_grad_batches: 1
num_sanity_val_steps: 1

gradient_clip:
  val: 32.
  algorithm: value

swa:
  enabled: False
  lr: 1.e-10

# =====================================================================
# Optimizer
# =====================================================================
optimizer:
  _target_: torch.optim.AdamW
  betas: [0.9, 0.95]

model_task: anemoi.training.train.tasks.multiforecaster.GraphMultiDatasetForecaster

strategy:
  _target_: anemoi.training.distributed.strategy.DDPGroupStrategy
  num_gpus_per_model: ${system.hardware.num_gpus_per_model}
  read_group_size: ${dataloader.read_group_size}

loss_gradient_scaling: False

rollout:
  start: 1
  epoch_increment: 0
  max: 1

max_epochs: null
max_steps: 150000

lr:
  warmup: 1000
  rate: 0.625e-4
  iterations: ${training.max_steps}
  min: 1e-12

submodules_to_freeze: []

# =====================================================================
# Loss / metrics per dataset
# =====================================================================
training_loss:
  datasets:
    opera:
      _target_: anemoi.training.losses.KernelCRPS
      scalers: ['node_weights','nan_mask_weights']   # add 'nan_mask_weights' if you have it
      ignore_nans: true

    nordic:
      _target_: anemoi.training.losses.KernelCRPS
      scalers: ['node_weights','nan_mask_weights']
      ignore_nans: true

    netatmo:
      _target_: anemoi.training.losses.KernelCRPS
      scalers: ['node_weights','nan_mask_weights']
      ignore_nans: true

validation_metrics:
  datasets:
    opera:
      kcrps:
        _target_: anemoi.training.losses.KernelCRPS
        scalers: ['node_weights','nan_mask_weights']
        ignore_nans: true
    nordic:
      kcrps:
        _target_: anemoi.training.losses.KernelCRPS
        scalers: ['node_weights','nan_mask_weights']
        ignore_nans: true
    netatmo:
      kcrps:
        _target_: anemoi.training.losses.KernelCRPS
        scalers: ['node_weights','nan_mask_weights']
        ignore_nans: true

# =====================================================================
# Variable groups (targets)
# =====================================================================
variable_groups:
  datasets:
    opera:
      default: precip
      precip:
        param: [RAINFALL_RATE]
    nordic:
      default: precip
      precip:
        param: [lwe_precipitation_rate]
    netatmo:
      default: precip
      precip:
        param: [rr]

# (Optional) list “headline metrics” here if your reporting expects it
metrics:
  datasets:
    opera: []
    nordic: []
    netatmo: []
