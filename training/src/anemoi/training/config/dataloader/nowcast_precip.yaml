prefetch_factor: 2
pin_memory: True

# ============
# read_group_size:
#   Form subgroups of model comm groups that read data together.
#   Each reader in the group only reads 1/read_group_size of the data
#   which is then all-gathered between the group.
#   This can reduce CPU memory usage as well as increase dataloader throughput.
#   The number of GPUs per model must be divisible by read_group_size.
#   To disable, set to 1.
# ============
read_group_size: ${system.hardware.num_gpus_per_model}

num_workers:
  training: 1
  validation: 1
  test: 1
batch_size:
  training: 2
  validation: 2
  test: 2

# ============
# Multi-dataset batch composition:
# Each batch will contain a dictionary with samples from all datasets:
# {"dataset_a": tensor_batch_a, "dataset_b": tensor_batch_b, ...}
# All datasets must have the same number of valid samples for synchronization
# ============

# runs only N training batches [N = integer | null]
# if null then we run through all the batches
limit_batches:
  training: null
  validation: null
  test: 20

# Dataset-specific grid indices configurations
# If not specified, all datasets will use the default grid_indices above
grid_indices:
  datasets:
    nordic_radar:
      _target_: anemoi.training.data.grid_indices.FullGrid
      nodes_name: ${graph.data}
    msg_seviri:
      _target_: anemoi.training.data.grid_indices.FullGrid  # Could be different
      nodes_name: ${graph.data}
    netatmo:
      _target_: anemoi.training.data.grid_indices.FullGrid  # Could be different
      nodes_name: ${graph.data}
    opera:
      _target_: anemoi.training.data.grid_indices.FullGrid  # Could be different
      nodes_name: ${graph.data}

# ============
# Multi-Dataset Configuration
# Define multiple datasets that will be synchronized during training
# Each dataset must have the same number of valid time samples
# ============

training:
  datasets:
    netatmo:
      dataset: ${system.input.netatmo}
      start: 2020
      end: 2024
      frequency: ${data.frequency}
      drop: []
    nordic_radar:
      dataset: ${system.input.nordic_radar}  # Using same dataset as duplicate for testing
      start: 2020
      end: 2024
      frequency: ${data.frequency}
      drop: []
    opera:
      dataset: ${system.input.opera}
      start: 2020
      end: 2024
      frequency: ${data.frequency}
      drop: []
    msg_seviri:
      dataset: ${system.input.msg_seviri}
      start: 2020
      end: 2024
      frequency: ${data.frequency}
      drop: []

validation_rollout: 1

validation:
  datasets:
    datasets:
    netatmo:
      dataset: ${system.input.netatmo}
      start: 2025
      end: 2025
      frequency: ${data.frequency}
      drop: []
    nordic_radar:
      dataset: ${system.input.nordic_radar}  # Using same dataset as duplicate for testing
      start: 2025
      end: 2025
      frequency: ${data.frequency}
      drop: []
    opera:
      dataset: ${system.input.opera}
      start: 2025
      end: 2025
      frequency: ${data.frequency}
      drop: []
    msg_seviri:
      dataset: ${system.input.msg_seviri}
      start: 2025
      end: 2025
      frequency: ${data.frequency}
      drop: []

# Multi-dataset test with same datasets, different time period
test:
  datasets:
    netatmo:
      dataset: ${system.input.netatmo}
      start: 2025-12-01
      end: null
      frequency: ${data.frequency}
      drop: []
    nordic_radar:
      dataset: ${system.input.nordic_radar}  # Using same dataset as duplicate for testing
      start: 2025-12-01
      end: null
      frequency: ${data.frequency}
      drop: []
    opera:
      dataset: ${system.input.opera}
      start: 2025-12-01
      end: null
      frequency: ${data.frequency}
      drop: []
    msg_seviri:
      dataset: ${system.input.msg_seviri}
      start: 2025-12-01
      end: null
      drop: []
