prefetch_factor: 2
pin_memory: True
validation_rollout: 1

# ============
# read_group_size:
#   Form subgroups of model comm groups that read data together.
#   Each reader in the group only reads 1/read_group_size of the data
#   which is then all-gathered between the group.
#   This can reduce CPU memory usage as well as increase dataloader throughput.
#   The number of GPUs per model must be divisible by read_group_size.
#   To disable, set to 1.
# ============
read_group_size: ${system.hardware.num_gpus_per_model}

num_workers:
  training: 8
  validation: 8
  test: 8

batch_size:
  training: 1
  validation: 1
  test: 1

limit_batches:
  training: null
  validation: null
  test: 20

training:
  datasets:
    era:
      dataset_config:
        dataset: ${scratch}/anemoi-datasets/era-accumulated/caerraml-ea-an-oper-atos-n320crop2carraeast-1991-2023-3h-v2-accum.zarr
        frequency: ${data.frequency}
        drop: []
      start: 1996-01-01T00:00:00
      end: 2018-12-31T23:00:00
      trajectory: null
    carra:
      dataset_config:
        dataset: ${scratch}/anemoi-datasets/carra-east/carra-east-rr-an-oper-no-ar-ce-mars-2p5km-1991-2024-3h-v4.zarr
        frequency: ${data.frequency}
        drop: []
      start: 1996-01-01T00:00:00
      end: 2018-12-31T23:00:00
      trajectory: null

validation:
  datasets:
    era:
      dataset_config:
        dataset: ${dataloader.training.datasets.era.dataset_config.dataset}
        frequency: ${data.frequency}
        drop: []
      start: 2019-01-01T00:00:00
      end: 2019-12-31T23:00:00
      trajectory: null
    carra:
      dataset_config:
        dataset: ${dataloader.training.datasets.carra.dataset_config.dataset}
        frequency: ${data.frequency}
        drop: []
      start: 2019-01-01T00:00:00
      end: 2019-12-31T23:00:00
      trajectory: null

test:
  datasets:
    era:
      dataset_config:
        dataset: ${dataloader.training.datasets.era.dataset_config.dataset}
        frequency: ${data.frequency}
        drop: []
      start: 2020-01-01T00:00:00
      end: 2023-12-31T23:00:00
      trajectory: null
    carra:
      dataset_config:
        dataset: ${dataloader.training.datasets.carra.dataset_config.dataset}
        frequency: ${data.frequency}
        drop: []
      start: 2020-01-01T00:00:00
      end: 2023-12-31T23:00:00
      trajectory: null
