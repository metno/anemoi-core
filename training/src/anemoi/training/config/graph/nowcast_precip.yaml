overwrite: True

# This is a *prototype* multi-source graph:
# - three data node types (opera/nordic/netatmo)
# - shared hidden nodes (k-means over concatenated data nodes)
# - a union mesh (concatenation of all data nodes)

data:
  opera: "opera"
  nordic: "nordic"
  netatmo: "netatmo"
hidden: "hidden"
mesh: "mesh"

nodes:
  opera:
    node_builder:
      _target_: anemoi.graphs.nodes.AnemoiDatasetNodes
      dataset: "PLACEHOLDER_OPERA_DATASET"
    attributes: ${graph.attributes.nodes}
  nordic:
    node_builder:
      _target_: anemoi.graphs.nodes.AnemoiDatasetNodes
      dataset: "PLACEHOLDER_NORDIC_DATASET"
    attributes: ${graph.attributes.nodes}
  netatmo:
    node_builder:
      _target_: anemoi.graphs.nodes.AnemoiDatasetNodes
      dataset: "PLACEHOLDER_NETATMO_DATASET"
    attributes: ${graph.attributes.nodes}

  hidden:
    node_builder:
      _target_: anemoi.graphs.nodes.builders.kmeans_hidden.KMeansHiddenNodes
      # set this in your experiment config
      num_hidden_nodes: 4096
      sources: ["opera", "nordic", "netatmo"]
    attributes: ${graph.attributes.nodes}

  mesh:
    node_builder:
      _target_: anemoi.graphs.nodes.builders.union_mesh.UnionMeshNodes
      sources: ["opera", "nordic", "netatmo"]
    attributes: ${graph.attributes.nodes}

edges:
  # Encoders: each dataset -> hidden
  - source_name: ${graph.data.opera}
    target_name: ${graph.hidden}
    edge_builders:
      - _target_: anemoi.graphs.edges.KNNEdges
        num_nearest_neighbours: 3
    attributes: ${graph.attributes.edges}
  - source_name: ${graph.data.nordic}
    target_name: ${graph.hidden}
    edge_builders:
      - _target_: anemoi.graphs.edges.KNNEdges
        num_nearest_neighbours: 3
    attributes: ${graph.attributes.edges}
  - source_name: ${graph.data.netatmo}
    target_name: ${graph.hidden}
    edge_builders:
      - _target_: anemoi.graphs.edges.KNNEdges
        num_nearest_neighbours: 3
    attributes: ${graph.attributes.edges}

  # Processor: hidden <-> hidden
  - source_name: ${graph.hidden}
    target_name: ${graph.hidden}
    edge_builders:
      - _target_: anemoi.graphs.edges.KNNEdges
        num_nearest_neighbours: 16
    attributes: ${graph.attributes.edges}

  # Decoder: hidden -> mesh (single decoder)
  - source_name: ${graph.hidden}
    target_name: ${graph.mesh}
    edge_builders:
      - _target_: anemoi.graphs.edges.KNNEdges
        num_nearest_neighbours: 3
    attributes: ${graph.attributes.edges}

attributes:
  nodes:
    area_weight:
      _target_: anemoi.graphs.nodes.attributes.SphericalAreaWeights
      norm: unit-max
      fill_value: 0
  edges:
    edge_length:
      _target_: anemoi.graphs.edges.attributes.EdgeLength
      norm: unit-std
    edge_dirs:
      _target_: anemoi.graphs.edges.attributes.EdgeDirection
      norm: unit-std

post_processors: []
